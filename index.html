<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nick johnson</title>
<link rel="icon" href="favicon.ico">

<style>

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    background: #f2f2f2;
    color: #111;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;

    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
}

.container {
    background: white;
    padding: 60px 40px;
    border-radius: 10px;
    text-align: center;
    max-width: 600px;
    width: 90%;

    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

h1 {
    margin: 0;
    font-weight: 500;
    font-size: 32px;
    letter-spacing: 0.5px;
}

.divider {
    margin: 20px auto;
    width: 40px;
    height: 2px;
    background: #ddd;
}

p {
    margin: 10px 0;
    font-size: 16px;
    color: #444;
}

a {
    color: #111;
    text-decoration: none;
    border-bottom: 1px solid #ddd;
    transition: all 0.2s ease;
}

a:hover {
    color: #0066ff;
    border-color: #0066ff;
}

</style>
</head>

<body>

<div class="container">
    <h1>nick johnson</h1>

    <div class="divider"></div>

    <p>based in new york</p>

    <p>
        can be reached at  
        <a href="mailto:nicjohnso@gmail.com">
            nicjohnso@gmail.com
        </a>
    </p>

    <div class="divider"></div>
</div>

</body>
</html>
