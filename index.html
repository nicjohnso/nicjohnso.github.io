<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>nick johnson</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>

* {
box-sizing: border-box;
}

body {
margin: 0;
font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
background: #1b1714;
color: #e6dfd6;
display: flex;
justify-content: center;
padding: 60px 20px;
}

.container {
max-width: 700px;
width: 100%;
background: #241f1a;
padding: 40px 30px;
border-radius: 12px;
box-shadow: 0 15px 40px rgba(0,0,0,0.08);
}

h1 {
margin-top: 0;
font-size: 36px;
}

p {
line-height: 1.6;
}

a {
color: inherit;
text-decoration: underline;
}

/* Dim separator */

hr {
border: none;
height: 1px;
background: #332b24;
width: 60px;
margin: 30px auto;
opacity: 0.8;
}

/* Blog section */

.blog {
margin-top: 60px;
}

.post-title {
cursor: pointer;
padding: 12px 0;
border-bottom: 1px solid #332b24;
font-weight: 500;
transition: color .2s ease;
}

.post-title:hover {
color: #d4a373;
}

.post-content {
  max-height: 0;
  padding-top: 0;
  overflow: hidden;
  transition: max-height .3s ease, padding-top .3s ease;
}

.post-content.open {
  max-height: 800px;
  padding-top: 10px;
}

/* Markdown styling */

.post-content h1 {
font-size: 24px;
margin-top: 20px;
}

.post-content h2 {
font-size: 20px;
}

.post-content p {
margin: 12px 0;
}

.post-content ul {
padding-left: 20px;
}

.post-content li {
margin: 6px 0;
}

</style>

</head>

<body>

<div class="container">

<h1>nick johnson</h1>

<hr>

<p>based in new york</p>
<p>can be reached at <a href="mailto:nicjohnso@gmail.com">nicjohnso@gmail.com</a></p>

<hr>

<div class="blog">

<div id="posts"></div>

</div>

</div>

<script>

async function loadPosts(){

let res = await fetch("posts.json")
let posts = await res.json()

let container = document.getElementById("posts")

posts.forEach(post => {

let title = document.createElement("div")
title.className = "post-title"
title.textContent = post.title

let content = document.createElement("div")
content.className = "post-content"

title.onclick = async () => {

if(content.innerHTML === ""){

let file = await fetch(post.file)
let md = await file.text()

content.innerHTML = marked.parse(md)

}

content.classList.toggle("open")

}

container.appendChild(title)
container.appendChild(content)

})

}

loadPosts()

</script>

</body>
</html>
